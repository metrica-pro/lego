name: fork-release

# Tag-driven Docker image build for the metrica-pro/lego fork.
# Pushes a multi-arch image to ghcr.io/metrica-pro/lego on every v* tag.
# The image consumes our cloudruevolution DNS-01 provider and is what Flux
# pulls for cert-manager-lego-webhook in the production cluster.
#
# Upstream `release.yml` continues to handle goreleaser / DockerHub / SBOM
# attestations and is gated on secrets we deliberately do not propagate to
# the fork (DOCKERHUB_*, SNAPCRAFT, AUR). This workflow is the fork-only
# minimum.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (default: current ref)'
        required: false

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  image:
    name: Build and push image to GHCR
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=lego ACME client (metrica-pro fork) with cloudruevolution DNS-01 provider
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Image digest
        run: echo "Pushed ${{ steps.build.outputs.digest }}"
