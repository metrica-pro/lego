        - BALANCING_POLICY_SELECTOR
      default: BALANCING_POLICY_UNSPECIFIED
      description: >-
        Алгоритм балансировки.

         - BALANCING_POLICY_UNSPECIFIED: Алгоритм балансировки не указан.
         - BALANCING_POLICY_ROUND_ROBIN: Алгоритм балансировки ROUND_ROBIN.
         - BALANCING_POLICY_ROUND_ROBIN_RESERVED: Алгоритм балансировки ROUND_ROBIN_RESERVED (пока не реализован).
         - BALANCING_POLICY_SELECTOR: ТАлгоритм балансировки SELECTOR (пока не реализован).
