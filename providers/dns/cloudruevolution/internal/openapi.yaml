openapi: "3.0.3"
info:
  title: Evolution DNS Public API
  version: 0.0.1
  description: '[Документация сервиса Evolution DNS](https://cloud.ru/docs/evolution-dns/ug/index.html)'
  contact:
    email: support@cloud.ru
servers:
  - url: https://dns.api.cloud.ru
security:
  - bearerHttpAuthentication: []
tags:
  - name: DnsServerService
  - name: OperationService
  - name: PrivateRecordSoleService
  - name: PrivateZoneService
  - name: PrivateZoneSoleService
  - name: PublicRecordSoleService
  - name: PublicZoneService
  - name: PublicZoneSoleService
  - name: ReverseRecordService
  - name: ReverseZoneService
  - name: VpcDefinitionService
paths:
  /v1/dnsServers:
    get:
      summary: Получение списка DNS-серверов
      operationId: DnsServerService_List
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/v1ListDnsServersResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: projectId
          description: Идентификатор проекта.
          in: query
          required: true
          schema:
            type: string
        - name: pageSize
          description: >-
            Максимальное количество результатов на странице ответа.

            Если значение больше [page_size], сервис возвращает [next_page_token], который

            используется в [ListOperationsResponse]. Значение [page_size] по умолчанию 100.
          in: query
          required: false
          schema:
            type: string
            format: int64
        - name: pageToken
          description: >-
            Токен запрашиваемой страницы с результатами. Чтобы получить
            результаты следующей

            страницы для [page_token], используйте значение [ListOperationsResponse.next_page_token],

            полученное из прошлого запроса.
          in: query
          required: false
          schema:
            type: string
        - name: filter
          description: >-
            Поле filter — это [cel-выражение](https://github.com/google/cel-spec/blob/master/doc/langdef.md),

            состоящее из фильтрующих выражений, каждое выражении соединяется оператором && (логическое и).


            Поддерживаемые поля:

            1. availability_zone_ids []string опциональное. Поддерживаемые операторы: 'in'.

            2. search string опциональное.
          in: query
          required: false
          schema:
            type: string
      tags:
        - DnsServerService
    post:
      summary: Создание DNS-сервера
      operationId: DnsServerService_Create
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dnsv1Operation"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/v1CreateDnsServerRequest"
        required: true
      tags:
        - DnsServerService
